<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-label="Corsia">
  <!-- Corsia wordmark, white-on-transparent.
       Used over dark photography (landing hero, dossier builder).
       Editorial serif in italic. no box, no background, just type. -->
  <text
    x="6"
    y="68"
    font-family='"Cormorant Garamond","Cormorant","Didot","Bodoni 72",Georgia,serif'
    font-weight="400"
    font-style="italic"
    font-size="76"
    letter-spacing="3"
    fill="#FAF7EE"
  >Corsia</text>
</svg>
